name: Release Please

on:
  push:
    branches:
      - master

jobs:
  # Publish unpublished packages to crates.io.
  release-plz-release:
    name: Release
    runs-on: ubuntu-latest
    if: |-
      ${{
        github.repository_owner == 'arcboxlabs'
        && startsWith(github.event.head_commit.message, 'chore: release')
      }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Create git tag + GitHub release for the facade version.
  # Runs in parallel with crates.io publishing.
  # Uses GitHub App token so the tag triggers release.yml (binary builds).
  create-release:
    name: Tag & GitHub Release
    runs-on: ubuntu-latest
    if: |-
      ${{
        github.repository_owner == 'arcboxlabs'
        && startsWith(github.event.head_commit.message, 'chore: release')
      }}
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Extract version and create release
        id: release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, skipping."
            exit 0
          fi

          # Extract the latest version section from CHANGELOG.md for release notes.
          NOTES=$(awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found' CHANGELOG.md)

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes "$NOTES"

          echo "Created release $TAG"

      - name: Update arcbox-desktop version
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BRANCH="chore/bump-arcbox-${TAG}"

          # Clone arcbox-desktop, create branch, update version file, push, and open PR.
          gh repo clone arcboxlabs/arcbox-desktop /tmp/arcbox-desktop -- --depth 1
          cd /tmp/arcbox-desktop

          CURRENT=$(cat arcbox.version | tr -d '[:space:]')
          if [ "$CURRENT" = "$TAG" ]; then
            echo "arcbox-desktop already at $TAG, skipping."
            exit 0
          fi

          git checkout -b "$BRANCH"
          echo "$TAG" > arcbox.version
          git add arcbox.version
          git commit -m "chore: bump arcbox version to ${TAG}"
          git push origin "$BRANCH"

          gh pr create \
            --repo arcboxlabs/arcbox-desktop \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump arcbox version to ${TAG}" \
            --body "Automated update from [arcbox ${TAG}](https://github.com/arcboxlabs/arcbox/releases/tag/${TAG})."

  # Create/update a release PR with version bumps and changelog.
  # Skipped when the push is a release commit (merged release PR).
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: |-
      ${{
        github.repository_owner == 'arcboxlabs'
        && !startsWith(github.event.head_commit.message, 'chore: release')
        && !contains(github.event.head_commit.message, 'release-plz/')
      }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
