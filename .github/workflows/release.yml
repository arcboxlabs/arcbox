name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.5)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # Determine version (shared by all jobs)
  # ==========================================================================
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

  # ==========================================================================
  # Build macOS ARM64 host binaries (abctl + arcbox-daemon)
  # ==========================================================================
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Protobuf compiler
        timeout-minutes: 5
        run: brew install protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build arcbox binaries (release)
        timeout-minutes: 15
        run: cargo build --release -p arcbox-cli -p arcbox-daemon

      - name: Codesign arcbox-daemon with virtualization entitlement
        run: |
          codesign --entitlements tests/resources/entitlements.plist \
            --force -s - target/release/arcbox-daemon

      - name: Verify artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh target/release/abctl
          ls -lh target/release/arcbox-daemon
          file target/release/abctl
          file target/release/arcbox-daemon

      - name: Upload host binaries
        uses: actions/upload-artifact@v4
        with:
          name: host-binaries-darwin-arm64
          path: |
            target/release/abctl
            target/release/arcbox-daemon
            tests/resources/entitlements.plist
          retention-days: 5

  # ==========================================================================
  # Build arcbox-agent (Linux guest binary, cross-compiled via musl)
  # ==========================================================================
  build-agent:
    name: Build arcbox-agent (Linux musl)
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl

      - name: Install musl cross-compiler
        run: brew install FiloSottile/musl-cross/musl-cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-agent-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-agent-musl-

      - name: Build arcbox-agent
        timeout-minutes: 10
        run: cargo build --release -p arcbox-agent --target aarch64-unknown-linux-musl

      - name: Verify artifact
        run: |
          ls -lh target/aarch64-unknown-linux-musl/release/arcbox-agent
          file target/aarch64-unknown-linux-musl/release/arcbox-agent

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/arcbox-agent
          retention-days: 5

  # ==========================================================================
  # Package tarball and attach to GitHub Release
  # ==========================================================================
  package-and-release:
    name: Package & Upload Release
    needs: [version, build-macos-arm64, build-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download host binaries
        uses: actions/download-artifact@v4
        with:
          name: host-binaries-darwin-arm64
          path: artifacts/host/

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-linux-arm64
          path: artifacts/agent/

      - name: Create tarball
        id: tarball
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TARBALL_NAME="arcbox-darwin-arm64-${VERSION}.tar.gz"
          STAGING="arcbox-darwin-arm64-${VERSION}"

          mkdir -p "$STAGING"
          cp artifacts/host/target/release/abctl "$STAGING/"
          cp artifacts/host/target/release/arcbox-daemon "$STAGING/"
          cp artifacts/agent/arcbox-agent "$STAGING/"
          cp artifacts/host/tests/resources/entitlements.plist "$STAGING/"

          tar czf "$TARBALL_NAME" "$STAGING"
          echo "tarball=$TARBALL_NAME" >> "$GITHUB_OUTPUT"

          echo "=== Tarball contents ==="
          tar tzf "$TARBALL_NAME"
          ls -lh "$TARBALL_NAME"

      - name: Generate SHA256 checksum
        run: |
          TARBALL="${{ steps.tarball.outputs.tarball }}"
          shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          cat "${TARBALL}.sha256"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          files: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.tarball.outputs.tarball }}.sha256
