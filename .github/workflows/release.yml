name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.5)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  APPLE_TEAM_ID: "422ACSY6Y5"

jobs:
  # ==========================================================================
  # Determine version (shared by all jobs)
  # ==========================================================================
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

  # ==========================================================================
  # Build + sign macOS ARM64 host binaries
  # ==========================================================================
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Protobuf compiler
        timeout-minutes: 5
        run: brew install protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain.
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate.
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the key without UI prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list.
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Verify.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > "$PROFILE_DIR/arcbox-daemon.provisionprofile"

      - name: Build arcbox binaries (release)
        timeout-minutes: 15
        run: cargo build --release --locked -p arcbox-cli -p arcbox-daemon -p arcbox-helper

      - name: Codesign arcbox-daemon
        run: |
          codesign --force --options runtime \
            --identifier com.arcboxlabs.desktop.daemon \
            --entitlements bundle/arcbox.entitlements \
            --sign "Developer ID Application: ArcBox, Inc. ($APPLE_TEAM_ID)" \
            target/release/arcbox-daemon
          codesign -v --deep --strict target/release/arcbox-daemon

      - name: Codesign arcbox-helper
        run: |
          codesign --force --options runtime \
            --identifier com.arcboxlabs.desktop.helper \
            --sign "Developer ID Application: ArcBox, Inc. ($APPLE_TEAM_ID)" \
            target/release/arcbox-helper
          codesign -v --deep --strict target/release/arcbox-helper

      - name: Codesign abctl
        run: |
          codesign --force --options runtime \
            --identifier com.arcboxlabs.cli \
            --sign "Developer ID Application: ArcBox, Inc. ($APPLE_TEAM_ID)" \
            target/release/abctl
          codesign -v --deep --strict target/release/abctl

      - name: Verify artifacts
        run: |
          echo "=== Build artifacts ==="
          for bin in abctl arcbox-daemon arcbox-helper; do
            ls -lh "target/release/$bin"
            file "target/release/$bin"
            codesign -d -v "target/release/$bin"
            echo
          done

      - name: Upload host binaries
        uses: actions/upload-artifact@v4
        with:
          name: host-binaries-darwin-arm64
          path: |
            target/release/abctl
            target/release/arcbox-daemon
            target/release/arcbox-helper
            bundle/arcbox.entitlements
            bundle/com.arcboxlabs.desktop.helper.plist
          retention-days: 5

  # ==========================================================================
  # Build arcbox-agent (Linux guest binary, cross-compiled via musl)
  # ==========================================================================
  build-agent:
    name: Build arcbox-agent (Linux musl)
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl

      - name: Install musl cross-compiler and protobuf
        run: brew install FiloSottile/musl-cross/musl-cross protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-agent-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-agent-musl-

      - name: Build arcbox-agent
        timeout-minutes: 10
        run: cargo build --release --locked -p arcbox-agent --target aarch64-unknown-linux-musl

      - name: Verify artifact
        run: |
          ls -lh target/aarch64-unknown-linux-musl/release/arcbox-agent
          file target/aarch64-unknown-linux-musl/release/arcbox-agent

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: agent-binary-linux-arm64
          path: target/aarch64-unknown-linux-musl/release/arcbox-agent
          retention-days: 5

  # ==========================================================================
  # Package tarball and attach to GitHub Release
  # ==========================================================================
  package-and-release:
    name: Package & Upload Release
    needs: [version, build-macos-arm64, build-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download host binaries
        uses: actions/download-artifact@v4
        with:
          name: host-binaries-darwin-arm64
          path: artifacts/host/

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: agent-binary-linux-arm64
          path: artifacts/agent/

      - name: Create tarball
        id: tarball
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TARBALL_NAME="arcbox-darwin-arm64-${VERSION}.tar.gz"
          STAGING="arcbox-darwin-arm64-${VERSION}"

          mkdir -p "$STAGING/bundle"
          cp artifacts/host/target/release/abctl "$STAGING/"
          cp artifacts/host/target/release/arcbox-daemon "$STAGING/"
          cp artifacts/host/target/release/arcbox-helper "$STAGING/"
          cp artifacts/agent/arcbox-agent "$STAGING/"
          cp artifacts/host/bundle/arcbox.entitlements "$STAGING/bundle/"
          cp artifacts/host/bundle/com.arcboxlabs.desktop.helper.plist "$STAGING/bundle/"

          tar czf "$TARBALL_NAME" "$STAGING"
          echo "tarball=$TARBALL_NAME" >> "$GITHUB_OUTPUT"

          echo "=== Tarball contents ==="
          tar tzf "$TARBALL_NAME"
          ls -lh "$TARBALL_NAME"

      - name: Generate SHA256 checksum
        run: |
          TARBALL="${{ steps.tarball.outputs.tarball }}"
          shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          cat "${TARBALL}.sha256"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          files: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.tarball.outputs.tarball }}.sha256
