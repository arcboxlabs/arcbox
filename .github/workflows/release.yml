name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.5)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # Build macOS ARM64 (Apple Silicon)
  # ==========================================================================
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-26
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tarball: ${{ steps.tarball.outputs.tarball }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Protobuf compiler
        timeout-minutes: 5
        run: brew install protobuf

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build arcbox binaries (release)
        timeout-minutes: 15
        run: cargo build --release --locked -p arcbox-cli -p arcbox-daemon

      - name: Codesign arcbox-daemon with virtualization entitlement
        run: |
          codesign --entitlements tests/resources/entitlements.plist \
            --force -s - target/release/arcbox-daemon

      - name: Verify artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh target/release/abctl
          ls -lh target/release/arcbox-daemon
          file target/release/abctl
          file target/release/arcbox-daemon

      - name: Create tarball
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_NAME="arcbox-darwin-arm64-${VERSION}.tar.gz"
          STAGING="arcbox-darwin-arm64-${VERSION}"

          mkdir -p "$STAGING"
          cp target/release/abctl "$STAGING/"
          cp target/release/arcbox-daemon "$STAGING/"
          cp tests/resources/entitlements.plist "$STAGING/"

          tar czf "$TARBALL_NAME" "$STAGING"
          echo "tarball=$TARBALL_NAME" >> "$GITHUB_OUTPUT"

          echo "=== Tarball contents ==="
          tar tzf "$TARBALL_NAME"
          ls -lh "$TARBALL_NAME"

      - name: Generate SHA256 checksum
        run: |
          TARBALL="${{ steps.tarball.outputs.tarball }}"
          shasum -a 256 "$TARBALL" > "${TARBALL}.sha256"
          cat "${TARBALL}.sha256"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcbox-darwin-arm64
          path: |
            ${{ steps.tarball.outputs.tarball }}
            ${{ steps.tarball.outputs.tarball }}.sha256
          retention-days: 30

  # ==========================================================================
  # Attach binaries to the existing GitHub Release (created by release-plz)
  # ==========================================================================
  upload-release-assets:
    name: Upload Release Assets
    needs: [build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name '*.tar.gz' -o -name '*.sha256' \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          cat *.sha256 > checksums.txt
          echo "=== Release assets ==="
          ls -lh .

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-macos-arm64.outputs.version }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
            release-assets/checksums.txt
