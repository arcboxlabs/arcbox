name: Check Toolchain Updates

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    name: Check for tool updates
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check and update tool versions
        id: update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if python3 scripts/check-tool-updates.py > /tmp/updates.txt; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            exit_code=$?
            if [ $exit_code -eq 2 ]; then
              echo "has_updates=false" >> "$GITHUB_OUTPUT"
            else
              exit $exit_code
            fi
          fi

      - name: Create pull request
        if: steps.update.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="chore/bump-toolchain-$(date +%Y%m%d)-${{ github.run_id }}"
          git config user.name "arcbox-bot[bot]"
          git config user.email "arcbox-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add assets.lock
          git commit -m "chore(tools): bump Docker toolchain to latest stable versions"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(tools): bump Docker toolchain to latest stable versions" \
            --body "$(printf '## Summary\n\n%s\n\nChecksums verified by downloading binaries and computing SHA-256.\n\n> Auto-generated by `check-tool-updates` workflow.' "$(cat /tmp/updates.txt)")"
