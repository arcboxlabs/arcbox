[package]
name = "arcbox-vmm"
description = "Virtual Machine Monitor for ArcBox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
arcbox-error = { workspace = true }
arcbox-hypervisor = { workspace = true }
arcbox-net = { workspace = true }
arcbox-virtio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tokio-util = "0.7"
lz4_flex = "0.11"
libc.workspace = true
arcbox-dns = { workspace = true }
arcbox-hv = { version = "0.3.20", path = "../arcbox-hv" }
vm-memory = { version = "0.17", features = ["backend-mmap"] }
linux-loader = { version = "0.13", features = ["elf", "pe"] }
vm-fdt = "0.3"
vm-superio = "0.8"
arcbox-fs = { version = "0.4.0", path = "../arcbox-fs" }
arcbox-net-inject = { version = "0.4.0", path = "../arcbox-net-inject" }
crossbeam-channel = "0.5"

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
# `gic` is on by default so every binary linking arcbox-vmm
# (daemon, hv_e2e example, tests) gets the hv_gic_* emulation.
# Without it, Linux boot dies in arch_timer / GIC probe because
# no distributor answers MMIO at 0x0800_0000 — same symptom as
# building with `default-features = false`.
default = ["gic"]
criu = []
gic = ["arcbox-hv/gic"]
vmnet = ["arcbox-net/vmnet"]

[lints]
workspace = true
