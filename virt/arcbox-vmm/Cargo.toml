[package]
name = "arcbox-vmm"
description = "Virtual Machine Monitor for ArcBox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
arcbox-error = { workspace = true }
arcbox-hypervisor = { workspace = true }
arcbox-net = { workspace = true }
arcbox-virtio = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
tokio-util = "0.7"
lz4_flex = "0.11"
libc.workspace = true
arcbox-dns = { workspace = true }
arcbox-hv = { version = "0.3.20", path = "../arcbox-hv" }
vm-memory = { version = "0.17", features = ["backend-mmap"] }
linux-loader = { version = "0.13", features = ["elf", "pe"] }
vm-fdt = "0.3"
vm-superio = "0.8"
arcbox-fs = { version = "0.3.21", path = "../arcbox-fs" }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = "3"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
default = []
criu = []
gic = ["arcbox-hv/gic"]
vmnet = ["arcbox-net/vmnet"]

[lints]
workspace = true
