repos:
  - repo: local
    hooks:
      - id: rust-fmt
        name: Rust format check
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: rust-clippy
        name: Rust clippy check
        entry: cargo clippy --workspace --exclude arcbox-agent
        language: system
        types: [rust]
        pass_filenames: false